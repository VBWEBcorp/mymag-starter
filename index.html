<!doctype html>
<html lang="fr" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO defaults (overridden per-page by react-helmet-async) -->
    <title>Nom Entreprise</title>
    <meta
      name="description"
      content="Votre entreprise — description courte et percutante de votre activité. Adaptez cette ligne à votre domaine."
    />
    <meta
      name="robots"
      content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"
    />
    <link rel="canonical" href="https://www.example.com/" />
    <meta name="theme-color" content="#6d28d9" />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nom Entreprise" />
    <meta property="og:title" content="Nom Entreprise" />
    <meta
      property="og:description"
      content="Votre entreprise — description courte et percutante de votre activité."
    />
    <meta property="og:image" content="https://www.example.com/og.png" />
    <meta property="og:url" content="https://www.example.com/" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nom Entreprise" />
    <meta
      name="twitter:description"
      content="Votre entreprise — description courte et percutante de votre activité."
    />
    <meta name="twitter:image" content="https://www.example.com/og.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&family=Plus+Jakarta+Sans:ital,wght@0,500..700;1,500..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
